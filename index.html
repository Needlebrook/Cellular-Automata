<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cellular Automata</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="controls">
        <button id="playBtn">Play</button>
        <button id="pauseBtn">Pause</button>
        <button id="stepBtn">Step</button>
        <button id="clearBtn">Clear</button>
    </div>

    <div class="top-right-ui">

    <select id="ruleSelect">
        <option value="conway">Conway</option>
        <option value="highlife">HighLife</option>
        <option value="seeds">Seeds</option>
        <option value="dayandnight">Day & Night</option>
        <option value="briansbrain">Brian's Brain</option>
        <option value="maze">Maze</option>
        <option value="mazectric">Mazectric</option>
        <option value="replicator">Replicator</option>
        <option value="serviettes">Serviettes</option>
    </select>

    </div>

    <div id="generationCounter">
        Generation: 0
    </div>

    <canvas id="canvas"></canvas>

    <script type="module" src="main.js"></script>
</body>
</html>
